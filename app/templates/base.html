<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeatherFox</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="/static/js/maps.js"></script>

  <style>
    /* ─── Design tokens ─────────────────────────────────────────────── */
    :root {
      --bg-top:        #619fe8;
      --bg-bot:        #1A2E45;
      --bg-current:    #3365a1; /* updated dynamically by JS from BACKGROUND_MAP */
      --card-bg:       rgba(255, 255, 255, 0.10);
      --card-border:   rgba(255, 255, 255, 0.16);
      --text-white:    #FFFFFF;
      --text-dim:      rgba(255,255,255,0.6);
      --text-dimmer:   rgba(255,255,255,0.35);
      --fox-amber:     #F0A04B;
      --popup-bg:      #FFFFFF;
      --popup-text:    #1A2E45;
      --popup-sub:     #4A6A8A;
      --radius-lg:     20px;
      --radius-md:     12px;
      --radius-sm:     8px;
      --shadow:        0 8px 40px rgba(0,0,0,0.28);
      --shadow-pop:    0 8px 28px rgba(0,0,0,0.18);
      --sidebar-width: 220px;
      --header-height: 56px;
      --transition:    0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      background-attachment: fixed;
      color: var(--text-white);
      transition: background 0.6s ease;
    }

    /* ─── App shell ──────────────────────────────────────────────────── */
    .app-shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ─── Header ────────────────────────────────────────────────────── */
    /*
     * DISSERTATION NOTE (Ch6 — Design):
     * Header is full-width and fixed above both sidebar and content.
     * The view toggle ("Weather Forecast" | "Weather Fox") allows
     * direct comparison between the control and prototype interfaces
     * within the same session — essential for the user study design.
     */
    .app-header {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(26, 46, 69, 0.6);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--fox-amber);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    .logo span { color: var(--text-white); }

    /* View toggle */
    .view-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 4px;
    }

    .toggle-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-dim);
      background: none;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .toggle-btn.active {
      background: rgba(255,255,255,0.15);
      color: var(--text-white);
      font-weight: 600;
    }

    .toggle-btn:hover:not(.active) {
      color: var(--text-white);
    }

    /* ─── Body row (sidebar + content) ──────────────────────────────── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ─── Sidebar ────────────────────────────────────────────────────── */
    /*
     * DISSERTATION NOTE (Ch6 — Design):
     * Sidebar allows switching between pre-generated scenarios.
     * Scenarios are fixed — chosen to demonstrate different fox states
     * (confident, hesitant, apologetic) for the user study.
     */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      background: rgba(0,0,0,0.18);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 24px 14px;
      overflow-y: auto;
      transition: width var(--transition), padding var(--transition);
      position: relative;
    }

    .sidebar.collapsed {
      width: 40px;
      padding: 24px 0;
      overflow: hidden;
    }

    /* Collapse toggle button — tab on the right edge of sidebar */
    .sidebar-toggle {
      position: absolute;
      top: 50%;
      right: -14px;
      transform: translateY(-50%);
      width: 28px;
      height: 48px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--text-dim);
      z-index: 10;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .sidebar-toggle:hover {
      background: rgba(255,255,255,0.2);
      color: var(--text-white);
    }

    .sidebar-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      margin-bottom: 12px;
      padding: 0 6px;
      white-space: nowrap;
      opacity: 1;
      transition: opacity var(--transition);
    }

    .sidebar.collapsed .sidebar-label,
    .sidebar.collapsed .scenario-list {
      opacity: 0;
      pointer-events: none;
    }

    .scenario-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: opacity var(--transition);
    }

    .scenario-btn {
      width: 100%;
      text-align: left;
      font-family: 'Outfit', sans-serif;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text-dim);
      background: rgba(255,255,255,0.06);
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }

    .scenario-btn:hover {
      background: rgba(255,255,255,0.12);
      color: var(--text-white);
    }

    .scenario-btn.active {
      background: rgba(240, 160, 75, 0.18);
      border-color: rgba(240, 160, 75, 0.4);
      color: var(--fox-amber);
      font-weight: 500;
    }

    /* ─── Main content ───────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px 60px;
      min-width: 0;
    }

    /* ─── View containers ────────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; position: relative; z-index: 1; }

    /* ─── Shared card ────────────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    /* ─── 7-day forecast table ───────────────────────────────────────── */
    .forecast-card {
      margin-top: 24px;
      overflow: hidden;
    }

    .forecast-card-header {
      padding: 20px 28px 0;
    }

    .forecast-card-title {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .forecast-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 0.86rem;
    }

    .forecast-table thead th {
      text-align: left;
      padding: 10px 28px;
      font-size: 0.63rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      border-bottom: 1px solid var(--card-border);
    }

    .forecast-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.14s ease;
    }
    .forecast-table tbody tr:last-child { border-bottom: none; }
    .forecast-table tbody tr:hover { background: rgba(255,255,255,0.05); }
    .forecast-table tbody tr.today-row { background: rgba(255,255,255,0.09); }

    .forecast-table tbody td {
      padding: 13px 28px;
      color: var(--text-white);
      vertical-align: middle;
    }

    .day-label { display: flex; align-items: center; gap: 10px; }

    .today-badge, .yesterday-badge {
      font-size: 0.59rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .today-badge     { background: #e8c29b; color: #1A2E45; }
    .yesterday-badge { background: rgba(255,255,255,0.15); color: var(--text-dim); }

    .cond-icon { font-size: 1.25rem; }
    .temp-high { color: var(--fox-amber); font-weight: 500; }
    .temp-low  { color: #9FC8E8; font-weight: 500; }

    .rain-pill { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); }
    .rain-dot  { width: 8px; height: 8px; border-radius: 50%; background: #9FC8E8; }

    /* ─── Popup shared styles ────────────────────────────────────────── */
    .popup {
      display: none;
      position: absolute;
      background: var(--popup-bg);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-pop);
      padding: 15px 17px;
      z-index: 300;
      color: var(--popup-text);
      animation: popIn 0.17s ease;
    }
    .popup.visible { display: block; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.93); }
      to   { opacity: 1; transform: scale(1); }
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .popup-title {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--popup-sub);
    }

    .popup-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      color: #aaa;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
    }
    .popup-close:hover { color: var(--popup-text); }

    .popup-body {
      font-size: 0.83rem;
      line-height: 1.56;
      color: var(--popup-sub);
      max-width: 260px;
    }
    .popup-body strong { color: var(--popup-text); font-weight: 600; }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .main-content { padding: 20px 16px 48px; }
      .sidebar { width: 180px; }
    }

    /* ─── Weather panel shared elements ─────────────────────────────── */
    .wp-inner {
      padding: 28px 28px 20px;
    }

    .wp-inner .panel-label {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .wp-date {
      font-size: 0.76rem;
      color: var(--text-dim);
      font-weight: 300;
      margin-bottom: 22px;
    }

    .wp-main-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 10px;
    }

    .wp-icon {
      font-size: 4rem;
      line-height: 1;
    }

    .wp-temps {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .wp-temp-max {
      font-family: 'Fraunces', serif;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.05em;
      line-height: 1;
      color: var(--fox-amber);
    }

    .wp-temp-min {
      font-size: 1.1rem;
      font-weight: 300;
      color: #9FC8E8;
    }

    .wp-label {
      font-size: 1rem;
      color: var(--text-dim);
      font-weight: 300;
    }

    {% block styles %}{% endblock %}
  </style>
</head>

<body>
<div class="app-shell">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="logo">Weather<span>Fox</span></div>

    <div class="view-toggle">
      <button class="toggle-btn active" id="btnControl"
              onclick="switchView('control')">
        Weather Forecast
      </button>
      <button class="toggle-btn" id="btnPrototype"
              onclick="switchView('prototype')">
        Weather Fox
      </button>
    </div>
  </header>

  <!-- ── Body row ─────────────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle"
              aria-label="Toggle sidebar">›</button>

      <div class="sidebar-label">Select Date</div>

      <div class="scenario-list" id="scenarioList">
        <!-- Injected from AVAILABLE_SCENARIOS via Flask -->
        {% for s in scenarios %}
        <button class="scenario-btn {% if loop.first %}active{% endif %}"
                data-date="{{ s.date }}"
                data-location="{{ s.location }}"
                onclick="selectScenario('{{ s.date }}', '{{ s.location }}', this)">
          {{ s.label }}
        </button>
        {% endfor %}
      </div>
    </aside>

    <!-- Main content -->
    <div class="main-content">

      <!-- View: Weather Forecast (control) -->
      <div class="view active" id="viewControl">
        {% block control_content %}{% endblock %}
      </div>

      <!-- View: Weather Fox (prototype) -->
      <div class="view" id="viewPrototype">
        {% block prototype_content %}{% endblock %}
      </div>

      <!-- Shared: 7-day table -->
      <div class="card forecast-card">
        <div class="forecast-card-header">
          <div class="forecast-card-title">7-Day Overview</div>
        </div>
        <table class="forecast-table">
          <thead>
            <tr>
              <th>Day</th>
              <th></th>
              <th>High</th>
              <th>Low</th>
              <th>Rain</th>
            </tr>
          </thead>
          <tbody id="forecastBody">
            <!-- Injected by JS -->
          </tbody>
        </table>
      </div>

      <div id="belowTable">
        {% block below_table %}{% endblock %}
      </div>

    </div>
  </div>
</div>

<script>
  /*
   * DISSERTATION NOTE (Ch7 — Implementation):
   * All weather data fetched from /api/scenario at runtime.
   * Shared renderers (table, background) live here.
   * View-specific renderers live in (block scripts).
   */

  const DAY_KEYS = ["YESTERDAY", "TODAY", "TOMORROW", "FOUR", "FIVE", "SIX", "SEVEN"];

  // ── Scenario fetch ──────────────────────────────────────────────────
  // Default: first scenario in the list
  {% if scenarios %}
  let currentDate     = "{{ scenarios[0].date }}";
  let currentLocation = "{{ scenarios[0].location }}";
  {% endif %}

  function selectScenario(date, location, btn) {
    currentDate     = date;
    currentLocation = location;

    document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    fetchScenario(date, location);
  }

  function fetchScenario(date, location) {
    fetch(`/api/scenario?date=${date}&location=${location}`)
      .then(r => r.json())
      .then(data => {
        renderBackground(data.today.icon_label);
        renderTable(data.weather, data.date);
        renderControl(data);
        renderPrototype(data);
      })
      .catch(err => console.error("Failed to load scenario:", err));
  }

  // ── Background colour ───────────────────────────────────────────────
  function renderBackground(icon_label) {
    const colour = BACKGROUND_MAP[icon_label] || "#619fe8";
    document.documentElement.style.setProperty('--bg-top', colour);
    document.documentElement.style.setProperty('--bg-bot', shadeColour(colour, -40));
  }

  // Darken a hex colour by amount (negative = darker)
  function shadeColour(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + amount));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + amount));
    const b = Math.max(0, Math.min(255, (num & 0xff) + amount));
    return `rgb(${r},${g},${b})`;
  }

  // ── Table renderer ──────────────────────────────────────────────────
  function buildDates(scenarioDate) {
    const dd   = scenarioDate.slice(0, 2);
    const mm   = scenarioDate.slice(2, 4);
    const yyyy = scenarioDate.slice(4);
    const base = new Date(`${yyyy}-${mm}-${dd}`);

    return DAY_KEYS.map((_, i) => {
      const d = new Date(base);
      d.setDate(base.getDate() + i);
      return d.toLocaleDateString("en-GB", {
        weekday: "short", day: "numeric", month: "short"
      });
    });
  }


  function renderTable(days, scenarioDate) {
    const dates = buildDates(scenarioDate);
    const tbody = document.getElementById("forecastBody");
    tbody.innerHTML = "";

    days.forEach((day, i) => {
      const d           = day.display;
      const isToday     = day.day === "TODAY";
      const isYesterday = day.day === "YESTERDAY";

      const badge = isToday
        ? `<span class="today-badge">Today</span>`
        : isYesterday
        ? `<span class="yesterday-badge">Yesterday</span>`
        : "";

      const rainPct  = Math.round(d.rain_percent * 100);

      tbody.innerHTML += `
        <tr class="${isToday ? 'today-row' : ''}">
          <td><div class="day-label">${dates[i]} ${badge}</div></td>
          <td class="cond-icon">${ICON_MAP[d.icon_label] || "🌤️"}</td>
          <td class="temp-high">${d.max_temp}°C</td>
          <td class="temp-low">${d.min_temp}°C</td>
          <td>
            <div class="rain-pill">
              <div class="rain-dot" 
                style="opacity:    
                ${Math.max(0.15, d.rain_percent)}">
              </div>
              ${rainPct}%
            </div>
          </td>
        </tr>`;
    });
  }

  // ── View toggle ─────────────────────────────────────────────────────
  function switchView(view) {
    document.getElementById('viewControl').classList.toggle('active',   view === 'control');
    document.getElementById('viewPrototype').classList.toggle('active', view === 'prototype');
    document.getElementById('btnControl').classList.toggle('active',    view === 'control');
    document.getElementById('btnPrototype').classList.toggle('active',  view === 'prototype');
    document.getElementById('belowTable').style.display = view === 'control' ? '' : 'none';
  }

  // ── Sidebar toggle ──────────────────────────────────────────────────
  const sidebar       = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');

  sidebarToggle.addEventListener('click', () => {
    const collapsed = sidebar.classList.toggle('collapsed');
    sidebarToggle.textContent = collapsed ? '‹' : '›';
  });

  // ── Popup shared close ──────────────────────────────────────────────
  function closeAllPopups() {
    document.querySelectorAll('.popup').forEach(p => p.classList.remove('visible'));
  }

  document.addEventListener('click', () => closeAllPopups());

  document.querySelectorAll('.popup-close').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); closeAllPopups(); });
  });

  // ── Weather panel — populates both ctrl and proto views ─────────────
  function renderWeatherPanel(data) {
    const today        = data.today;
    const scenarioDate = data.date;

    const dd   = scenarioDate.slice(0, 2);
    const mm   = scenarioDate.slice(2, 4);
    const yyyy = scenarioDate.slice(4);
    const yesterday = new Date(`${yyyy}-${mm}-${dd}`);
    const todayDate  = new Date(yesterday);
    todayDate.setDate(yesterday.getDate() + 1);

    const dateStr = todayDate.toLocaleDateString("en-GB", {
      weekday: "long", day: "numeric", month: "long", year: "numeric"
    });

    ["ctrl", "proto"].forEach(prefix => {
      const el = id => document.getElementById(prefix + id);

      if (el("WpDate"))    el("WpDate").textContent    = dateStr;
      if (el("WpIcon"))    el("WpIcon").textContent    = ICON_MAP[today.icon_label] || "🌤️";
      if (el("WpTempMax")) el("WpTempMax").textContent = `${today.max_temp}°C`;
      if (el("WpTempMin")) el("WpTempMin").textContent = `${today.min_temp}°C`;
      if (el("WpLabel"))   el("WpLabel").textContent   = today.label;
    });

    window.wpRainGroup = {
      mm:      today.rain_mm,
      percent: today.rain_percent,
    };

    window.wpHumidityGroup = {
      value: today.humidity,
      name:  today.humidity_name,
    };

    window.wpWindGroup = {
      speed: today.wind_speed,
      dir:   today.wind_dir,
      name:  today.wind_name,
    };
  }

  // ── Stubs — overridden by view-specific scripts ─────────────────────
  function renderControl(data)   { /* defined in control view */ }
  function renderPrototype(data) { /* defined in prototype view */ }

  // ── Initial load ────────────────────────────────────────────────────
  fetchScenario(currentDate, currentLocation);
</script>

{% block scripts %}{% endblock %}

</body>
</html>
